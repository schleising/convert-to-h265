[folders]
include = [
    "/Volumes/Media/TV",
    "/Volumes/Media/Films",
]
exclude = [
    "/Volumes/Media/Films/VR",
]
backup = "/Volumes/Media/Backup"
conversions = "/tmp/Movies/convert-to-h265-work"

[schedule]
timezone = "Europe/London"
scan_time = 00:00:00
start_conversion_time = 00:05:00
end_conversion_time = 23:59:00

[encoding]
video_codec = "hevc_videotoolbox"
small_height_threshold = 600
x265_crf = 28
x265_crf_small_height = 23
x265_preset = "medium"
vt_qv = 55
vt_qv_small_height = 55
vt_g = 240
vt_keyint_min = 240
vt_realtime = 0

[runtime]
log_directory = "__HOME__/Library/Logs/convert-to-h265"
secrets_dir = "__APP_SUPPORT_DIR__/runtime/src/secrets"

[path_map]
from = "/Media"
to = "/Volumes/Media"